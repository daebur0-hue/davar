<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Searchdae | AI Persona</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>

<body>
<div class="outline-bg">
    <div class="outline-track track-left">
        <div>VIRGINIA</div>
        <div>✝</div>
        <div>BMW</div>
        <div>NIKE</div>
        <div>👤</div>
    </div>

    <div class="outline-track track-right">
        <div>RICHMOND</div>
        <div>MERCEDES</div>
        <div>✝</div>
        <div>HONDA</div>
        <div>ADIDAS</div>
    </div>
</div>
    <!-- Main Glow Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Moving Outline Background Layer -->
    <div class="outline-bg">

        <div class="outline-track track-left">
            <div>VIRGINIA</div>
            <div>✝</div>
            <div>BMW</div>
            <div>NIKE</div>
            <div>ADIDAS</div>
            <div>RICHMOND</div>
            <div>👤</div>
            <div>HONDA</div>
            <div>JORDAN</div>
        </div>

        <div class="outline-track track-right">
            <div>CHEVROLET</div>
            <div>✝</div>
            <div>MERCEDES</div>
            <div>VIRGINIA</div>
            <div>👤</div>
            <div>TOYOTA</div>
            <div>NIKE</div>
            <div>BMW</div>
        </div>

    </div>


    <main class="container">

        <header>
            <h1 class="logo">
                Search<span>dae</span>
            </h1>

            <p class="subtitle">
                Ask anything about Davar's world
            </p>
        </header>


        <div class="search-area">

            <div class="search-box">

                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Ask about me..."
                    autocomplete="off"
                >

                <button id="search-btn">

                    <span class="btn-text">
                        Search
                    </span>

                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
                    </svg>

                </button>

            </div>

        </div>


        <div id="ai-response-container">
            <!-- AI response appears here -->
        </div>


    </main>


    <script src="script.js"></script>

</body>
</html>
