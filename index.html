<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Persona | Search</title>
    <link rel="stylesheet" href="style.css">
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Dynamic Animated Background -->
    <canvas id="bg-canvas"></canvas>

    <main class="container">
        <header>
            <h1 class="logo">Search<span>Me</span></h1>
            <p class="subtitle">Ask anything about Alex's world</p>
        </header>
        
        <div class="search-area">
            <div class="search-box">
                <input type="text" id="user-input" placeholder="Ask about my skills, goals, or hobbies..." autocomplete="off">
                <button id="search-btn">
                    <span class="btn-text">Search</span>
                    <svg class="icon" viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" /></svg>
                </button>
            </div>
        </div>

        <div id="ai-response-container">
            <!-- AI answers will appear here with typing effect -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
